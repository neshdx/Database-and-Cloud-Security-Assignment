<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{{ role }} - View Parcels</title>

    <link href="{{ url_for('static', filename='view_parcel.css') }}" rel="stylesheet">
</head>

<body>

    <div class="top-container">
        <h1>Parcel List</h1>
    </div>

    <div class="main-content">

        <table border="1">

            <thead>
                <tr>
                    <th>Parcel ID</th>
                    <th>Student ID</th>
                    <th>Username</th>
                    <th>Student Contact</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>

                {% for parcel in parcels %}
                <tr>
                    <td>{{ parcel.parcel_id }}</td>
                    <td>{{ parcel.student_id }}</td>
                    <td>{{ parcel.username }}</td>
                    <td>{{ parcel.student_contact }}</td>

                    <td>

                        <!-- ✅ CSRF FIX + ROUTE FIX -->
                        <form action="{{ url_for('send_notification', id=parcel.id) }}"
                              method="post">

                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                            <button type="submit">Send Notification</button>

                        </form>

                    </td>
                </tr>
                {% endfor %}

            </tbody>

        </table>

        <a href="{{ url_for('staff_dashboard') }}">
            <button class="btn" type="button">Back to Dashboard</button>
        </a>

    </div>

</body>

</html>
