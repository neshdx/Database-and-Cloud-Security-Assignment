<!DOCTYPE html>
<html>
<head>
    <title>Student Notifications</title>
</head>
<body>
    <h2>Your Notifications</h2>
<table>
    <thead>
        <tr>
            <th>Message</th>
        </tr>
    </thead>
    <tbody>
        {% for notification in notifications %}
        <tr>
            <td>{{ notification.message }}</td>
        </tr>
        {% else %}
        <tr>
            <td colspan="2">No notifications found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

</body>
</html>
