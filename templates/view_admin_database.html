<!DOCTYPE html>
<html lang="en">

<head>
    <link href="{{ url_for('static', filename='admin_database.css') }}" rel="stylesheet" type="text/css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>View Admin Database</title>
</head>

<body>

    <div class="top-container">
        <h1>Parcel Data</h1>
    </div>

    <div class="main-content">

        <div>

            <table border="1">

                <thead>
                    <tr>
                        <th>Parcel ID</th>
                        <th>Student ID</th>
                        <th>Username</th>
                        <th>Student Contact</th>
                    </tr>
                </thead>

                <tbody>

                    {% for parcel in parcels %}
                    <tr>
                        <td>{{ parcel.parcel_id }}</td>
                        <td>{{ parcel.student_id }}</td>
                        <td>{{ parcel.username }}</td>
                        <td>{{ parcel.student_contact }}</td>
                    </tr>
                    {% endfor %}

                </tbody>

            </table>

        </div>

        <!-- ✅ FIXED ROUTES -->
        <a href="{{ url_for('generate_pdf_report') }}" target="_blank">
            <button class="btn" type="button">Generate Report</button>
        </a>

        <a href="{{ url_for('admin_dashboard') }}">
            <button class="btn" type="button">Back to Dashboard</button>
        </a>

    </div>

</body>

</html>
