<!DOCTYPE html>
<html lang="en">
<head>
    <link href="/static/login.css" type="text/css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courier Login</title>
</head>

<body>

    <form class="container" method="POST" action="/courier_login">

        <h1>Login as a Courier</h1>

        <!-- ✅ CSRF FIX -->
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <label for="courier_username">Username:</label><br>
        <input type="text" id="courier_username" name="courier_username"
               placeholder="Enter your username" required><br><br>

        <label for="courier_password">Password:</label><br>
        <input type="password" id="courier_password" name="courier_password"
               placeholder="Enter your password" required><br><br>

        <button type="submit">Login</button>

        <p>Don't have an account?
            <a href="/courier_register">Sign up here</a>
        </p>

    </form>

</body>
</html>
